body:
  text: 提要吕氏雜記雜家類三雜説之屬臣等謹案吕氏雜記二卷宋吕希哲撰希哲字原明先世萊州人後家壽州夷簡其祖公著其父也初以父蔭入官公著為相之日不肯求進取公著没始為兵部員外郎進崇政殿説書紹聖初以秘閣校理出知懐州旋分司南京居和州徽宗初召為光禄少卿力請外補以直秘閣知曹州坐黨籍奪職後復厯知相邢二州罷奉宫祠羈寓淮泗間以卒事迹具宋史本傳希哲少從焦千之孫復石介學又從二程子張子及王安石父子遊故其學問亦出入於數家之中醇疵互見朱子語録稱其學於程氏意欲直造聖人盡其平生之力乃反見佛與聖人合今觀此書喜言禪理每混儒墨而一之誠不免如朱子所言又宋史載王安石欲薦希哲為講官希哲辭曰辱與公相知久萬一從仕將不免異同則疇昔相與之意盡安石乃止故所記安石父子事亦無譏訶之詞然其記顧臨使北之對則謂為世教者當重儒又謂祖孔宗孟學之正也茍異於此皆學之不正又記司馬光闢佛之語又斥老子剖斗折衡之説而深辨孔子非師老子又極論禮樂之不可廢則其所見特如蘇軾蘇轍之流時時出入二氏固未可盡以異學斥至於直載劉涇太學頌以見過尊安石直載程公遜賀待制詩以見過諛王雱則於荆舒父子亦有㣲詞非竟相黨附者矣其他所記家世舊聞朝廷掌故多可與史傳相叅考中如把柳湍水一條喜怒哀樂一條耕莘釣渭一條今皆悞入程氏遺書中殆以詞㫖相近故不及辨别耶是書宋志不著録通考嵗時類中有吕原明嵗時雜記二卷考陸㳺渭南集有嵗時雜記跋稱太平無事之日故都節物及中州風俗人人知之若不必記自喪亂來七十餘年遺老凋落無在者然後知此書之不可闕則當如夢華録之類又周必大平園集有嵗時雜記序稱上元一門多至五十餘條則分門輯類之書與此不合惟文淵閣書目載吕原明雜記一冊葢即此本其中所載詩話如王逵贈蔡襄作元綘賀王安石作吕公弼遊東園作諸篇厲鶚宋詩紀事皆未采入知近代久無傳本今以永樂大典所載裒合成帙編為二卷間有吕氏他書之文而永樂大典誤標此書者疑以傳疑亦併録之而各附案語訂正焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
