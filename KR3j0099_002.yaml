body:
  text: 呂氏雜記卷下宋呂希哲撰李文靖公沆為相時真廟常夜遣使持手詔問欲以某氏為貴妃如何文靖對使者引燭焚詔口附奏曰但道沆以為不可其事遂寢書曰成王畏相其此之謂乎文靖公尹京時梁丞相適為掾屬公語諸子梁君異日必為輔相問何以知之曰府掾皆京官他人方拜於庭下皆有自耻之色獨適容貌自若以此知之凡公所以得士皆以器度觀之而世俗不知者謂得學堂相法蓋家世無傳焉趙元昊反有詔削奪在身官爵募能生擒元昊若斬首者即以為節度使仍賜萬貫文靖公時在大名聞之驚曰謀之誤矣立削奏曰前代方鎮叛命如此誥誓則有之矣非所以禦外夷也萬一反有不遜之言得無損國體乎朝廷方改之已聞有指斥之詞矣文靖公往嘗逰越州有詩曰賀家湖上天花寺一一軒窗向水開不用閉門防俗客愛閒能有幾人來文靖公三入中書後有詩曰政事堂前花盛開去年春色又重來主人雖在花應笑鬢似秋霜心似灰二篇盛傳於世而傳寫多誤李宫保初退居眼猶未甚昏大書終制以示子孫于無請諡下書二聨曰加之惡號重為子孫之羞假以美名亦無功德可稱冦萊公知開封府張給事佖判三司都勾院真宗欲用佖為三司使辭以不能帝曰誰能之曰理財之任舉朝未見其人姑取名望可以壓人則冦凖可乃以冦為三司使張知開封府張亦卒不拜命真廟時林逋隱居錢塘纍召不至臨死為詩曰茂陵他日求遺稿猶喜曽無封禪書先是古人詩云茂陵遺藁惟封禪始信相如死不忠蘇丞相言天聖中許公為東參言者言交趾以七十艘載兵就朱崖迎丁謂朝廷頗動乃詔侍禁楊宏押內臣於彼體量其實便欲除之方召宏至政事堂右相問交趾迎丁謂事天使知之否宏對外人亦傳聞不知其實左相云朝廷之意深憂其為變天使當體朝廷之意無使至於亂也宏罔知所措右相無語將退許公曰分㕔後却請天使略到某本㕔宏到許公諭以朝廷遣使去者祗為有人上變故專遣使按驗欲知真妄天使到彼但據實事馳報朝廷丁公雖得罪然是舊相若無他事故不得輒驚動之宏意方釋然宏既過海了無一事時言者以時相有血讐欲希㫖傾之耳朝廷亦以宏所按問為信蓋蘇公親得之宏云宋元憲嘗奏事而帶寬誤墜文書數紙於地不顧而行仁宗呼內侍臣拾以與之議者謂仁宗有人君體宋公得大臣體田宣簡公况為三司使時人目為照天蠟燭以其眀見物情也楊宣懿公察繼其任譽不減田公人目之為水晶燈籠慶歷中蔡君謨自福建轉運使召為諫官時王逵知福州作詩送行不記其破題後六句云好將公道口去沃聖君心民困魚思水兵驕隼在林天涯一樽酒不為别離斟翰林王狀元灝丱角時從其父至官府畢相士安時為郡官見其有異于人又定目看便㕔上書字問其父曰此子亦讀書耶曰亦令就學又問曽學屬對否曰其師嘗教之但某不識其能否乃指壁間字曰此有一句詩無人對得曰鸚鵡能言爭似鳯灝應聲曰蜘蛛雖巧不如蠶畢相大驚異延之家孰自教養之卒成大名魏公之官浙西也馬少保亮為兩浙轉運使因公事過公而見文靖馬少保好相人見文靖公大竒之欲妻以女其夫人怒曰公常貴此女奈何欲與黃面措大耶馬少保曰是非而所知卒嫁之是為秦國夫人及文靖拜參知政事馬夫人得見之後馬少保作八座文靖已拜相矣文靖公馬少保亮壻也文靖貧甚馬夫人使密置銀二笏於卧內文靖視之如無物也他日取去亦不問馬公益器重之曰呂郎必作太平宰相後親見其登庸魏野上冦萊公詩云好去上天辭富貴却來平地作神仙萊公既南貶所過關津驛舍皆題於窗壁初文靖公薨侍讀公主家政族人逰東園正獻為詩曰桃溪不減舊華萼又經春後惠穆公又逰東園為詩曰今嵗春光還婉娩故時賔從亦蕭條正獻公守潁時趙康靖公槩自南京訪歐陽公於潁與公二人㑹燕於歐陽公第因名其堂曰㑹老後公守河陽司馬文正公范忠文公自洛來訪因名所館曰禮賢是二㑹皆有歌詩樂語盛傳於世范淳夫寄詩紀其事曰㑹老名堂清潁上禮賢開館大河濵蘇子瞻和歐陽少師韻一時冠蓋盡嚴終次公嚴助終軍二子皆少年之貴舊德年來豈易逢聞道堂中延蓋叟縯曹參為齊相嘗避正寢以延蓋公定應牀下拜梁松厚馬援有疾梁松候之拜牀下援曰我乃松父友也雖貴何得失其序乎蠧魚自曬間箱篋縯世說郝隆以七月七日曬書科斗長收古鼎鐘科斗詳見石鼓詩注子仁謂歐陽公收古鼎鐘銘刻最多見集古日録我欲棄官重問道寸筳何以得舂容縯東方叔答客難言以筳撞鐘豈能發其音聲韓詩東野不回頭有如寸筳撞巨鐘援禮記學記待其從容然後能盡其聲注云從讀如戈舂之舂嘉祐中正獻公言君子當正其衣冠尊其瞻視王介甫之衣冠不整亦一大病正獻公守潁日嘗騎馬出渡橋將至岸而橋壞略無所傷後數年人稍知之皆云騎馬渡橋也然家僮僚吏多不知子進一日侍語及之問信有之否公曰然以語邢和叔和叔曰橋壞而神色不動未為難也能不為人言此其難耳韓忠獻公治平中請退表曰廊廟之言有愧負薪之語功名之減難偕治郡之時又表曰方今論道巖廊悉臯䕫之舊德宣威藩屏皆方召之傑材至於侍從之臣咸富經綸之業歐陽文忠公請退表曰居常碌碌曽莫異於片言一有紛紛遂獨當於衆怒富文忠公之入相也楊宣懿公察為承旨當直其制曰上以對宗廟之靈下以酬士民之望明年以水災求去歐陽公在翰林為批答曰朕惟宰輔之司朝廷所繫職或非稱勢固易搖比以連年厭於屢易戒用人之勿審致厥位之靡安故於圖任之初尤極精求之意而議者謂卿有天下之譽慶朕得非常之才豈惟斷不惑於豫心抑亦慰久鬱之人望則朕之用卿者至矣卿之自待者何如方沃嘉猷遽形退讓豈廊廟之崇貴重者其憂難任富貴之至位髙者則慮易危耶朕嘗歷考往昔之人其於進退之際過計而圖全者未必無患忘身而徇國者固多令名惟爾之明必知所擇富公與韓公並相位久之又求去歐公復為批答曰至於一二之臣是為同德下逮衆人之論曽無間然方將甄叙賢愚修明法度務究本根而更治不為嵗月之近功期於有成兹乃豫意近世詔答之絶筆也神宗初陳暘叔在樞府求郡以便養親正獻公時在翰林作答詔云退食委蛇自足榮於就養𤾉叔不說蓋惑於鄭說以為譏已也謂惠穆公曰猶自不退食裏公乃凖備一詔云雖枋臣光寵之異足以顯親唯上國甘珍之多尤宜就養蓋補成前詔之義也未及用而暘叔得請外補范富韓三公自為侍從時天下皆稱為公先公每至嵗首令諸子各自言新年所進益治平中李常公擇數與朋友言吕蔡州未嘗聞其疾聲見其遽色亦未嘗草書學者師慕之其後唯范淳夫如此先公時知蔡州歐陽公答先公書曰修行能素薄仰慕清德夢寐之勤自謂終身不可跂及唯得託附髙名以見後世滎陽公嘗曰吾嘗夜而計過然自閒居來嘗自省已頗無過事又曰吾讀荀子非相篇然後知有相術也吾讀韓氏謝自然詩然後知有神仙也豫生五十有三年茍極富貴之樂事窮山水之勝逰豈惟心力已有所不逮於殘年晚日鋪排亦不能矣若汲汲為善則亦未晚要無虛日云耳惠穆公輔政以薦士為先務其所薦達後多顯於朝廷嘗上薦賢書於英宗曰自傾心膂徒殫報國之小忠廣致賢能始盡事君之大義正獻公嘗薦士於朝後不如所稱公以為恨程伯淳曰寧可受人欺不可易吾好賢之心晏元獻殊喜薦士其得人為多其亡也范忠文鎮為挽辭曰平生欲報國所得是知人行父兄嘗題壁云但畏賢者之議論不顧小人之是非范蜀公自為雅樂參考書傳躬親礱錯型笵之事亦已勞矣費私財亦數千計踰年然後成然其磬聲響不發者乃取石於陽翟山中為之今太常有泗濵磬璞山積而人不知也使蜀公當日請之朝廷必不惜也張康節公忭長憲府甚有直聲常對正獻公言中丞亦不難作但衆人以為不是者與他言耳熙寧時劉涇為太學頌曰有四大儒越出古今王氏父子呂氏兄弟荆公聞之怒曰我四分中只得一分熙寧初吳冲卿問王介甫若見吳江小龍怕耶不怕耶介甫曰亦怕亦不怕若不怕無以與民同患若怕無以退藏于密王荆公以經義成自吏部尚書平章事遷左僕射門下侍郎其子元澤雱以預修撰亦自天章閣待制遷龍圖閣學士元少保厚之絳時參知政事作賀詩曰詔書朝下未央宫上相新兼左相雄一代元勳金石上三經髙義日星中陳前輿服加桓傅拜後金珠有魯公東閣故人心倍喜白頭扶病詠丞嵩然元澤堅辭竟不拜命依前待制時荆公知江寧府故也王韶既取熙河裕陵親解玉帶賜王荆公元厚之作詩賀曰誰人更得通天帶謀合君心只晉公王荆公在翰林兼修實録一日以詩題實録院壁云御栁新黃染舊條宫溝薄凍未全消不知人世春多少先看天邊北斗杓不數日遂參知政事既參政作商鞅詩曰自古驅民在信誠一言為重百金輕國人未可非商鞅商鞅能令政必行自此遂拜相後罷相作大觀文知江寧府作詩云投老歸來一幅巾尚思寵祿被藩臣芙蓉堂下疏秋水且與龜魚作主人其子元澤待制和云直須自到池邉放今世仍多鄭校人蓋指吕吉甫也其後荆公再入相吉甫自參知政事以本官知陳州荆公為相既久時吳正憲冲卿充為樞密使裕陵每於諸公進呈罷多留吳獨與之語荆公作詩云穰侯老擅關中事常恐諸侯客子來我亦暮年專一壑每逢車馬便驚猜不久吳遂代荆公作相荆公既罷相辭使相判江寧府復以大觀文領集禧觀使仍居金陵作詩云乞得膠膠擾擾身五湖煙雨替風塵只將鳬雁同為侣不與龜魚作主人又作詩云偶向松間覔舊題野人休誦北山移丈夫出處非無意猿鶴從來自不知又作謝公墩詩云我名公字偶相同我屋公墩在眼中公去我來墩屬我不應墩姓尚隨公時陳和叔內翰繹知江寧府就使衙作㑹召荆公不喜辭之以詩云只喜往來相邂逅却嫌招喚苦丁寧其後東坡自黃州歸路由金陵荆公見之大喜與之出遊因贈之詩坡依韻和云騎驢渺渺入荒陂想見先生未病時勸我試求三畝宅從公已覺十年遲至元祐元年春荆公疾篤作詩云老年無欣豫况復病在牀汲水置新花取慰此流芳流芳在須臾吾亦豈久長新花與故吾已矣可兩忘數日遂薨荆公熙寧元豐間既閒居多騎驢遊肆山水間賔朋至者亦給一驢蘇子瞻詩所謂騎驢渺渺入荒陂是也後好乘江州車坐其一箱其相對一箱不可虛茍無賔朋則使村僕坐焉共載而行其真率如此車之有屏蔽者溫公熙寧三年辭樞密副使不拜四年自永興路安撫使遷京西北路安撫使又辭不赴請西京閒局留臺許之優遊多暇訪求河南境內佳山水處凡目之所睹足之所歷窮盡幽勝之處十數年間倦於登覽於是乃與楚正叔通議王安之朝議耆老者六七人相與㑹於城中之名園古寺且為之約果實不過五物殽膳不過五品酒則無算以為儉則易供簡則易繼也命之曰真率㑹文潞公時以太尉守洛求欲附名於其間溫公為其顯弗納也一日潞公伺其為㑹戒厨中具盛饌直往造焉溫公笑而延之曰俗却此㑹矣相與歡飲夜分而散亦一時之盛事也亦曰平㑹後溫公語人曰吾知不合放此老入來章子厚嘗言釋氏戒妄語事司馬君實曰妄語莫大於釋氏神通變化之事在理必無而釋氏昌言之非妄語而何司馬溫公卒門人或欲遺表中入規諫語程正叔曰此公平生來末嘗欺人可死後欺君乎歐陽公居潁日與正獻公及劉敞原甫魏廣晉道焦千之伯强王回深甫徐無逸從道七人㑹於聚星堂分題賦詩得癭木壺其詩曰天地産衆材任材謂之智棟桷與楹杙小大無有棄方者以矩度圓者中規制嗟爾木之癭何異肉有贅生成擁腫姿賦象難取類櫽括所不施鈎繩為爾廢大匠睨而往惻然乃有意孰非造化功而終朽不器刳剔虛其中朱漆為之僞㪺漿挹酒醴施用惟其利犧象非不珍金罍豈不貴設之於楹階十目肯注視幸因左右容及見為竒異人之于才性夫豈逺於是性雖有不善在教之揉勵才無不可用由上所措置飾陋就其長皆得為良士執一以廢百衆功何由備是唯聖人心能通天下志識者於是知公有輔相之器初歐陽文忠公舉蘇子瞻沈文通舉蘇子由應制科兄弟皆中選時王介甫知制誥以子由對策專攻上身及後宫封還詞頭乃喻文通為之詞曰雖文采末極條貫靡究朕知可謂愛君矣蓋文與介甫意正相反子由謝啓云古之所謂鄉願者今之所謂中庸常行之行古之所謂忠告者今之所謂狂狷不遜之徒又云欲自守以為是則見非者皆當世之望人欲自訟以為非則所守者亦古人之常節歐陽公在翰林日建言䜟緯之書淺俗誣怪悖經妨道凡諸書及傳疏所引請一切削去之以無誤後學仁宗命國子學官取諸經及正義所引䜟緯之說逐旋寫録奏上時執政者不甚主張之事竟不行滕元發知鄆州歐陽公經過自作口號有兩句韓愈文章名一代霍光功業冠三朝時魏公猶在王樂道陶裕陵之初自御史中丞罷為樞密直學士知陳州鬱鬱不得志先是樂道嘗為潁府及東宫官長踐阼之初上章言當用某人為某官某人為某官唯闕集賢相蓋以自處也至是作詩云本是儲王羽翼客今為天子腹心人又詩云殺吾賢輔嗟何及負此良朋歎已遲及至陳州謝上表云誠欲尊奬主威收還君柄六卿絶分晉之禍三家無弱魯之强又言方幸君幼之足陵豈思天戒之可畏又云唯是真宗久病丁謂弄權已去復留異時同惡又云攀附舊僚翻作吠堯之犬選掄新進皆為媚竈之人熙寧七年呂吉甫為翰林進端午門帖子曰虛心清暑殿預戒一陰生蓋意有所指也邵堯夫雍居洛下三十年而樂聖人之道焉豫屢造其隱居堯夫言以未嘗皺眉為自得處熙寧末王元澤作待制程公遜詩曰潤色聖猷雙孔子裁成天下兩周公西臺王大夫稱左司云堂堂君子貌落落大臣形豐夫與左司書云反本還原已深眀于自已入神致用將博濟於眀時劉仲馮之為郎也緣修條事以檄召三帥帥不肯來封檄聞上上使中黃門賜手札曰朝廷待遇三帥亞於二府是何小臣輒敢呼召嘉祐中朝廷患𣙜貨務支百官諸軍月俸不繼命從官二人計度其事二人者以禁帑有滯貨久不發乃奏大損其價以售民數日之間用度以給人皆以為善獨三司老吏非之衆不諭也既而𣙜貨常日所入甚虧縮適與所得數合蓋商賈所持錢本有常數利其賤者則常所賣者無錢以售理自然也治平初某監藥蜜庫出黃蘖供染紙處其色甚鮮近聞乃以紅花退水染紙紙甘蠧聚當益速壞矣王嗣宗真宗朝守邠土舊有狐王廟相傳能與人為禍福州人畏事之嵗時祭祀祈禱不敢少怠至不敢道胡字嗣宗至郡集諸邑獵户得百餘人以甲兵圍其廟薰灌其穴殺百餘狐或云有大狐從白光中逸去其妖遂息後人有復為立廟者則寂然無靈矣嗣宗後帥長安處士种放人主所禮每帥守至輒面教之嗣宗不服以言拒之放責數嗣宗聲色甚厲嗣宗怒以手批其頰先是真宗有敕書令种放有章奏即付驛欲詣即乘驛放乘驛訴於上前上特于嵩山陽置書院以處之而不加罪嗣宗去郡有人送詩曰終南處士威風減渭北妖狐窟穴空嗣宗大喜歸告其子孫曰吾死無為碑志但刻此詩於石立於墓旁其為榮也多矣皇祐中張堯佐為三司使時堯佐兄女貴妃有寵言事官王舉正包拯唐介等言堯佐妃之族叔以恩澤進陛下富之可也貴之可也然不可任以政事仁宗特為詔自今后妃之家及尚主者不得與政迄今為故事貴妃卒贈溫成皇后歐陽公為學士立春進門帖子其溫成閣詩曰內助從來上所嘉新春不忍見新花君王念舊憐遺族常使無權保厥家何郯上仁宗論張堯佐不可進處二府臣伏見三司使禮部侍郎張堯佐慶歷三年冬從開州來是時猶作南宫散郎自頃至今不五六年間遂歷盡要近乃尹京邑及司籍計緣堯佐雖由進士登第歷官無他過然驟被寵用人情皆以止緣後宫之親非復以才能許之况三司使位望任使為二府之亞跂步便至今堯佐充三司使已踰年若大饗訖事衆議謂陛下以酬勞為名必當進用堯佐在兩府果如衆議命行之日言事之臣必以死爭當此之時陛下欲决用堯佐則當黜言者聽用言者則頃刻罷堯佐酌之兩途必難並立然用堯佐而黜言者則纍德聼言者而罷堯佐則傷恩纍德則損歸聖躬傷恩則怨起近戚欲聖躬無所損外戚無所怨莫如富貴堯佐而不假之以權如李用和處之正得宜也前古近戚成敗之間其鑒不逺崇寵過當則不免禍咎抑損得所則必能安全禍咎安全不唯其家繫之抑亦國隨而興衰也此書傳所載不可悉數陛下聰眀固宜監觀往事以為社稷之計前嵗陛下備禮冊命貴妃外廷紛紜已有物議然臣當時未嘗論列者蓋以天子列嬪妃之位眀有典章若不干預政事置亦無害今用堯佐至三司使已是預政事况於進處二府則天下之議當以為何如堯佐進用與否固亦末測陛下之意然而已進用而後言縱能追罷在人臣頗獲直名於陛下已損盛德固莫若先事而言冀陛下審處其事使無過差則君臣上下之道兩得之矣臣以言責在左右周旋四五年但事干朝廷大體及大姦大蠧無不論列䝉陛下多賜採納今以親老方將外補唯於堯佐一事心知不可而遂不建一言則異時臣負懷情不盡之責故於將行不敢默默而復布腹心焉伏望陛下幸採臣章俯從公議不徇一時之愛以全千古之名則雖盡南山之竹不足載德美之盛與夫寵一人而失天下之心者不可同日而語也包拯上仁宗論張堯佐除四使不當狀臣伏觀張堯佐優異之恩無有其比竊以堯佐素乏材能徒以夤緣後宫僥幸驟進國家計府須材以辦經費堯佐猥尸其職中外咸謂非據近者臺諫繼有論列陛下雖罷其任使而復加崇寵轉踰於前併授四使又賜二子科名賢愚一詞無不嗟駭夫爵賞名數天下之公器不當以後宫踈戚庸常之材過授寵渥使忠臣義士無所激勸且堯佐居職物論紛紜固當引分辭避而晏然恃賴曽無一言自陳叨竊居位日覬大用及異恩既出復託以假告未即祗受其意尚若不足繼有邀求不䖍君命莫甚於此者昔漢元帝時馮野王以昭儀之兄在位多舉其行能帝曰吾用野王後世必謂我私後宫親戚本朝太宗皇帝孫妃之父止授南班散秩蓋保全後宫戚屬不令事勢僣盛以取顛覆伏望陛下逺鑒前古之事近守太宗皇帝聖範追取堯佐新命除與一郡以熄中外之議伏以陛下自臨馭以來孜孜勤政無有失德今忽行此事有損聖眀若濫賞必行則朝綱墮紊四方駭用人之失二鄙萌輕國之心臣方叨司憲適覩除命事干國體不敢緘默望聖慈開納速降指揮或臣言不行即乞罷臣憲司出補逺郡元符二年八月丙申宣吕惠卿移鎮制章子厚詣文德押麻詢許蔡二公云䕫連三日留身又留三劄子莫是薦士否冲元笑云必是大差除元度云非也是日乃劉后滿月九月丙午召學士蔣之竒入見上指御座後文字付之竒立賢妃劉氏之竒奏云封建嬪妃諸王皆中書具熟狀付學士院唯拜相則面受詔㫖此不知是何人文字上云此皇太后所降手詔亦不須進熟狀只依此批㫖之竒乃啓封云皇帝所咨近臣請建中宫事劉賢妃柔眀懿淑德冠後宫誕育元良為宗廟萬世之福今中宫將建非斯人其誰可當所宜備舉典册以正位號之竒讀訖乃批云九月七日內東門面奉聖旨賢妃劉氏可立為皇后以今月八日降旨處分元符三年上皇踐阼長樂垂簾有詔命蔣樞密進入所降詔書長樂乃云初並不知驗得乃是內侍劉友端書寫宰執方相顧詢問章子厚遽云是惇進入先帝云已得兩宫旨令撰大意云非斯人其誰可當莫不指大意否卞云且不知有此因依之竒云當時只道東朝語故著之麻詢論及簾前太母聞惇自認草詔事再三嗟嘆云當初將謂劉友端稍親文墨恐友端所撰即不知是相公做之竒云惇更不成人無可議者惇略無怍色元符二年九月八日降册册賢妃劉氏為后擇二十七日發冊正言鄒浩自試院中出乃以二十五日上殿論冊后事不當是日批出鄒浩勒停新州羈管仍令開封府即日差人押出門二十六日習儀殿廬中批付三省以吕嘉問舉官不當削一職展三年磨勘已而御史左膚論開封遲留浩不即日出城又於城外稽留纍日下嘉問問狀又送御史臺令元差人具析有何人祖送浩者上至面諭輔臣云士大夫有易服自别門出往勞送之者而所差人不能盡識往還之人中丞安惇又乞根治遂送御史臺制勘悉得姓名都講王回乃吏部尚書葉祖洽所薦與浩最為密熟首就逮繫至臺中詰之乃能誦浩所上章千餘言安惇等上章以為回嘗預謀先削籍編置餘出謁者皆衝替有贈遺者皆追官勒停唯舉人罰金蔣之竒吕嘉問葉祖洽嘗通簡皆落職小郡未幾又攝浩弟沼就臺詰之得朱紱傅楫輩嘗贐以金者亦皆追停都水使者曾孝廣又以張商英曽對已言鄒浩立如此大名節豈肯要人物遂申尚書省陳告崇政殿說書周穜嘗對館閣方天若稱浩曰難天若以告蔡京京以上聞穜天若皆貶黃履右丞引劉禹錫唐介事欲徙之內地罷政守亳州國子祭酒周嘗對客稱終是好人貶栁州監酒又朝奉郎監進奏院曽誠素與浩友善誠乃嘉問壻浩本誠所引亦送部與外任差遣已而又遣廣西漕臣鍾正甫就劾問浩于新州除已施行之外人更有餽贐者否未報而哲廟遺制已下矣元祐垂簾故事中書密院赴內東門以次覆奏元符末上皇踐阼欽聖垂簾章惇恐獨對陳其誤國本末遂呼尚書省禮房出劄子云內東門覆奏須同奏乃太常所定三省密院得旨依乾興中丁謂欲獨奏事衆以為不可此乃故事西府云密院獨班於簾前誠未安豈可不商量後便如此定蔡卞云須檢故事要是密院乃以先定三省密院同奏事皇太后以與故事不同令本房以貼子問三省門下云不知元改因依尚書省但檢坐故事回報中書云請問太常寺遂下太常寺答云䝉門下相公指揮改覆字作同字既呈上云三省亦呈來云樞密院于簾前獨班奏事固自為未安然於皇太后禮數有所貶損既不曾與同列商量又不曾面奏取㫖只暗地諭太常寺改覆奏作同以此不敢不理㑹太母云這裏也不爭却是他朝廷事體合改正須改正遂依故事改正作以次覆奏卞云章惇豈但此事不商量於定宗廟社稷大計亦不與衆人商量但啓口衆莫敢異建中靖國元年五月忽中批太常博士范致虛除右正言是時蔡京猶以宫祠居錢塘舉朝莫知所自蓋范氏兄弟素與左階道録徐知常相善皆建陽人亦霑中表知常出入溫成張后家上皇踐阼內中張賢妃進御侍王氏首見親幸張妃蓋溫成姪也知常既因緣張門知名禁中又以符水有效於元符殿中黃冠之盛自知常始致虛乃因知常達姓名於元符且道其平日趨向以非相蔡京不足有為時宫禁宦官合為一辭以引京外廷自宰執而下拒之方衆忽得一致虛遂亟用之以示好惡故有是命致虛就職未久乃乞收用安惇蹇序辰疏云二臣之罪不除則兩朝之謗終在外廷不知結締已深如吳材王能甫皆致虛所引猶欲痛貶致虛上雖黽勉從之出為郢州通判尋復以起居舍人召矣鄧洵武本蔡卞所引元符末卞去位乃附蔡京韓李當國自右史移少常建中靖國六月洵武進一愛莫助之圖謂主上方紹述先志朝中無人助者其圖大抵如史書年表列為旁通分為左右序中立其目自宰執侍從臺諫郎官寺監館閣學校分為七隔左曰紹述右曰元祐左序每隔三數人宰執但溫益一人而已右序自宰執而下舉朝士大夫皆在其間又於左序别立一名用小貼子已揭去其下注云若欲紹述先烈非相斯人不可降出付溫益益乃欣然奉行乞籍記異論之人於是上决意用京時事自此丕變矣龍昌期少時為僧嘗上朱台符詩曰洗硯書名紙磨錢擲卦爻侯門千萬仭應許野僧敲台符愛其材勸之業儒昌期博極羣書而議論怪僻蜀人張公祐之徒知名士皆師事之其徒甚衆文潞公薦於朝得官仁宗詔給筆札令進所撰經義嘉祐初書成詣闕上進賜五品服及金帛其書謂詩無比興如鴛鴦者遂仰也大率如此又以周公為周之賊于是臺諫交攻昌期自詣登聞鼓院還納所賜聽之景純家兄時判鼓院親見其還今國史但言以人言追奪誤也昌期過洛見潞公責其不能為已辨眀潞公曰朝廷方崇尚周孔之教而先生非之故至此耳昌期曰某何嘗非孔子但非周公耳潞公曰亦足矣正獻公守潁時有誠大士在湖西薦福院講華嚴經潁倅張隱之比部喜內學舊與誠逰一日誠為素饌召隱之公聞之使人語誠欲掇坐誠即加籩豆之實而隱之家亦備蔬爼甚豐公又盛為具以往人言有此院來未有此盛㑹也公問佛許十二時中以二時外學誠曰如醫卜之類歟隱之曰外學者學佛學法耳然則不許其外學時正念而已正念者無念也曹洞所謂正位是也宗師謂佛也著不得嗚呼今得二時內學可貴矣龎公曰我貴剎那净金州書所言道義往復書問所談至理往往箭鋒相注於郵中函蓋合於半道豈唯同道方知抑亦同病相憂故也安般三昧計日見功一切時中凡資於人者必非安樂不以長要人說話要人相伴要人娛樂乃至說話須是自著力受用始得玉泉老舉趙州云小便雖小事須是老僧親去古來禪人相見撞著磕著如電光石火便識得破作得主正為境界現前時要如此枝梧息觀如何更須觀一切法空念念不可得助成定力又須於行住坐卧時繫念不忘則易熟如來座者一切法空是祥師云無我者能晏坐學道之人雖知一切法皆空若臨事未能消遣先須諦觀是身無常是身無苦是身無我是身皆空久自休歇皆是漸門修無量心其四曰捨然後實無我人衆生又曰知再讀般若甚善君子閒居固當自强不息禮有小心外貌斯須之戒况在困者尤宜加意整勵非獨禪誦為然飲食動靜皆應自立章程譬如女工日有丈尺易曰利用恆無咎未失常也報慈云老僧百無所解日日一般牧馬童子乘日之車皆此意也稍或倣徨徙倚搘頥則不期於憂而憂自至豈惟旁觀有澤畔之容亦不能使家人忘其貧矣行歌拾穗猶是假修彈琴讀書自有常樂更若向上一路則契經有一偈那伽行在定那伽住在定那伽坐在定那伽臥在定盡大地是箇自己山河世界一切物象皆是自己建立猶如晝夜云既知如是是則我人衆生壽者種種違順法非法相莫不皆空若向這裏信得及把得住信得徹便可隨緣消舊業任運著衣裳飢來吃飯困來打坐更有何事求坐禪習定者如牧牛人瞥然在魔界便謂牛已奔逸起來作力牽回繫在舊處如此不三兩回已疲勞矣若知只是妄想顛倒夢見牛走忽然驚覺乃知牛本不動常在舊處自然不勞心力通作一片普安知藏道者指大藏語人曰如來說一大藏經教大意欲人省事向裏來辭雖淺語甚要大般若涅槃經云凡所引喻不必盡取少分或取多分或復全取如言如來面如滿月是名少分成實論之譬喻不必令盡相似如言乳具但取其色不取其堅軟言面如滿月但取盛滿不取形色顧子敦奉使北人問嘗學佛否答曰臨未嘗從事於此又言王眀叟不喜佛事釋氏學二君皆儒臣也其言如此蓋儒學有所未至耳北人有問子敦南朝為重佛為重道子敦答曰重儒為世教者自當如此江南進士王令逢原少不羈好為狂詭之行或跨驢入山每以蒸餅十數掛驢項上後改節師事王介甫介甫雅重之時蔣潁叔亦在介甫之門或問二人之行以王令方申公以蔣方劉原甫王令既卒有詩云行藏已許終身共生死那知半路分後為之作傳云王令蝗詩其略曰始知在人不在天譬如蚤蝨生裳衣魚枯生蟲肉腐蠧理有常爾夫何疑又長篇云至和改元之一年有蝗不知自何來一蝗百兒月再孕漸恐髙厚塞九垓死時才二十三早慧而夭逢原見器於荆公公以夫人女弟妻之為嫁其遺腹女與吳師禮後歷右司員外郎子說其外孫也魏野之門人潘閬欲往京師其師止之不聽既至而後悔之作詩曰不信先生語剛來帝里逰清宵無好夢白日有間愁真宗聞之不悅他日自華山東來倒騎驢以行曰我愛看華山其實不喜入京也故當時有潘閬倒騎驢之語治平中見程正叔先生言今之守令唯制民之産一事不得為其他在法度中甚有可為者患人不為耳伊川程正叔嘗言史稱有人至西域見嬰兒生木葉上見人則笑摘之則死此妄也理中無此事愚意以為天地之間茍人心之所能思口之所能言者皆有之族父仲儀少卿曽獲一小蜃蛤其中隱出蟄龍之形頭角尾足鱗鬛皆具龍之屈伸變化信可驗也其子希元至今寶之李景弼性淳厚嘗因話次觸人忌諱是人勃然變乎色厲然形乎言而李不知是人之愠已也少頃復觸之如是者數四人始諒其無他顔色如故而李卒不悟李翰林宗諤其父文正公昉秉政時避嫌逺勢出入僕馬與寒士無辨一日中路逢文正公前騶不知其為公子也遽呵辱之是後每見斯人必自隱蔽恐其知而自愧也有人請見武平倉卒忘易巾幘遂著帽以進武平顔色不動相見如常其人既退始覺子進居先公之喪在舊第極北小堂中誦經籬之外即李氏故宅今衆家居之歌哭鬬氣與夫雞犬牛馬之聲喧然雜入於耳子進聽之如聽谷響焉不以入心所以能爾者以我無預於彼之利害休戚故也若夫室中之聲亦如是者其得道之人乎戊寅年記子進在潁就叔弼借接䍦叔弼有詩曰奉借山公舊接䍦最宜笻杖與荷衣習家池上花初盛醉後多應倒載歸子進以為精絶不可繼也遂無和劉庠彈歐陽修於英宗衰服下著緊絲花襖子曰細文麗密閃色鮮眀衣於純吉之日已纍素風服於大喪之中尤傷禮教滎陽公為郡處分公帑蓄鰒魚諸乾物及筍乾菌乾以待賔客以減雞鴨等生命也入內都知張留後茂則凡上樽酒大官膳團茶皆不食食之而美不終食命徹去或曰子不法王介甫乎介甫之於飲食精粗交進而無所擇曰安敢望介甫介甫無心於飲食者也故若是如豫者朝食珍則暮不能糲食是於飲食未能無心也將以豫之不可學介甫之可壬申年書八珍者淳熬也淳母也炮也搗珍也漬也熬也糝也肝膋也先儒不數糝也分炮豚炮牂為二皆非也蘇子瞻一日稱熟猪肉之美淳夫曰其奈發風何子瞻笑謂豫曰淳夫誣告猪肉士人多就禪剎素食人或相勸以素食恐虛人臟腑有何道人震者在彼參禪或以此說問何答曰有多少事不說蒸餅䬪飥豈解虛人臟腑也都城西南十五里有地名鏖糟陂土人惡之自易為好草陂至今四鄉之人猶襲舊號問彼方之民僉曰好草陂也天漢臺橋西舊有鄧相公廟世傳鄧通廟近嵗廟官自榜其前曰此乃後漢鄧禹廟非鄧通也
