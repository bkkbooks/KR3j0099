body:
  text: 呂氏雜記卷上宋呂希哲撰王聖美嘗云堯舜禹皆聖人也而堯為先覺文武周公皆聖人也而文王為先覺舜禹湯武王周公待堯伊尹文王覺之而後覺者也學有本末循而下之至於末循而上之至於本灑掃應對進退所以涵養浸潤而求至於道也但惡夫畫耳思而得至於無思行而得至於無為此所謂學而知之者也書曰思曰睿睿作聖呂與叔中庸口義君子中庸章總論中庸之大體中庸之書聖門學者盡心以知性躬行以盡性始卒不越乎此書孔子傳之曾子曾子傳之子思子思述所授之言以著於篇故此書所論皆聖人之緒言入徳之大要也中庸鬼神之為徳章王聖美言此章說至誠也而胡先生以鬼神說之似見處淺矣呂與叔口義亦言此章論誠之本論語舉一隅不以三隅反則不復也易曰引而伸之觸類而長之賜也聞一以知二知之進也回也聞一以知十知之盡也十成數也老子曰道生一一生二二生三易曰天一地二以至天九地十堯舜性者也至俟命而已矣汝州云堯舜性與道合者也其於為善則無意於為善也如此然後與道合湯武則初未能盡合道學而知之反而至於此然後為聖人性之比把柳者荀子之說也湍水者揚子之說也喜怒哀樂未發之前意必固我既絶之後古之學者為已其終至於成物今之學者為人其終至於䘮已田明之云詩曰庶幾夙夜以永終譽經曰立身行道揚名於後世名譽不可以已也但不可飾行以取名曲意以避謗與其有負於心而得者曷若直道受謗而無愧於心也若使人受其謗而已取其譽尤非君子長者之用心也學道之人當自檢察今日以前所作不善誠心懴悔不可一向歸罪先世祖孔子而宗孟軻學之正也茍異於此皆學之不正也先致其所知然後修身其為功也易蓋有知之而不能行者矣雖然不免為小人也先修其身然後求致其所知其為功也難蓋有强力而行而所知未至者矣雖然不害為君子也其所患者誠身有道不明乎善則有流而入於異端者焉知譬則目也行譬則足也君子直道而行正其誼不謀其利明其道不計其功是也為學者用力愈久則愈見其深言學者當習不動初習不動時但違其心及人之憎惡已加之捶楚殺害皆堅忍不動久習自然不動矣既不動則曰我不動也修身至於樂修之至也則樂生矣和氣薫蒸盭氣自消煩慮定心乃强為學者須先得其要閑邪然後能存其誠孰不為言法言言之長孰不為行徳行行之宗也二程之學以聖人為必可學而至而已必欲學而至於聖人横渠張子厚之學以行而不能使人化之則所行未至也徐仲車之學以誠為主張載字子厚修徳講道所居而化敎學於横渠人謂之横渠先生每至京師予必從之問學焉其弟張戩天祺亦自立予亦友之修已以正人謂之善政修已以敎人謂之善教修已以化人謂之善化以身化人者吾見其人矣以心化人者未之見也或問以身化人之人曰横渠張先生其人也言忠信行篤敬聞其風者從之遊者日遷善而不自知也胡安定先生自慶歴中敎學於蘇湖間二十餘年束修弟子前後以數千計皇祐末召先生為國子監直講專管勾太學數年進天章閣侍講兼學政其初人未甚信服乃使其徒之已仕及早有世譽者盛之僑顧子敦臨呉元長孜輩分治職事又孫莘老覺説孟子中都士人稍稍從之一日升堂講易音韻髙朗意指明白衆方大服然並列者皆不喜謗議蠭起先生偃然不顧也彊力不倦以卒有立迄今三十餘年循用其規模不廢時髙弟猶有不悦者方之在湖學亦少屈矣呉坦求在太學時嘗謁姜先生先生時方閉門謝客坦求從牖間窺之見其儼然危坐如對大賔知其不為無人而輟也遂師事之福唐有陳烈季甫周希孟公闢鄭穆閎中陳襄述古窮經苦節以古人相期故當時有四先生之號章望之表民作四賢傳行于世又其友人劉彝執中方佐胡安定先生興學校於蘇湖間及其歸也鄉人謂之五先生聞於天下陳鄭劉三君吾皆從之問道焉季甫公闢未嘗出鄉里故不得而識之吾弱冠之年與紀常在太學時王道粹學士王才叔學士並轡來謁先生且問貴游子弟之賢者先生答吕晦叔二子皆有父風二公即先生所染刺欲相見先生召吾二人者同坐於首善堂後久之安定先生之治學校雖規矩備設而不盡用焉以徳敎為主關中案此下原本闕文紀常賦好察邇言虞舜其斯以為舜不恥下問孔文是以謂之文歐陽文忠公每為文既成必屢自竄易至有不留本初一字者其為大文章則書而傅之屋壁出入觀省之至於尺牘單簡亦必立藁其精審如此每一篇出士大夫皆傳冩諷誦唯覩其渾然天成莫究斧鑿之跡也曾於諸子學舍中與劉原父書一書十數本范中發言吟詩有二害招悔吝損心氣予幼時有敎學老人謂予曰人借書而與之借人書而歸之二者皆癡也聞之便不喜其語後觀顔氏家訓説借人典籍皆須愛䕶先有闕壊就為補治此亦士大夫百行之一也乃知忠厚者如此詩曰我思古人實獲我心語助之字若都無意義然不可相易也則其意義深矣逺矣汙俗之溺人也甚於淵水以謝安之賢而不能自拔於流俗况不及安者心術正者雖遇不善之人不善之政不能化之使為惡也心術不正者雖遇至善不能化之使為善也是故擇術不可不慎正者吾心也不正者非吾心也習焉而已矣静而觀之則吾心可見矣人固有一言而可以觀之者今世俗喜道無好人三字此可以觀其自處矣君子謂人皆可以為堯舜者無他焉觀於已而知之人好言無好人三字甚非也是不知其父祖也是不自見於其身也孟子曰堯舜與人同耳蓋以已觀之京師人有以金銀繒錦實二篋附放其相知數年而死彼人歸諸其子子曰我父平日未嘗一言及此且無契券之驗殆公之誤也其人曰我躬受之爾父豈待契券與汝必嘗預聞哉兩人相推無敢當其人持以白於官府時包孝肅公尹京驗究其實斷與子世俗之説皆謂今人無復良心唯有利耳聞是二人之風可以釋一時之疑豪傑之士雖無文王猶興其次不遇堯舜文王而不盡其材多矣亦有堯舜之政堯舜之敎堯舜之化或能變其心易其慮或止能革其面者聖人在上革道已成乃僅使小人革面非聖人之罪也其所以陷溺其心者有淺深也既有斗不可復剖也既有衡不可復折也後世聖人因而為之法度禁約期於使民不爭而已矣老子曰古之善為道者非以明民將以愚之書稱堯之徳曰平章百姓百姓昭明記曰明明徳於天下老子曰報怨以徳孔子曰以直報怨以徳報徳老子曰知不知上不知知病孔子曰知之為知之不知為不知蓋孔子未嘗師老子也伊尹之耕於有莘也說之築於傅巖也太公之釣於渭水也其於天下非事事而究其利病也非人人而竭其賢否也明其在已而已矣及乎得志行乎天下舉而措之耳鳴條之事出於伊尹牧野之事基於文王伊尹聖人也太公仁人也書曰伊尹相湯伐桀武王伐殷又曰惟尹暨湯咸有一徳湯曰聿求元聖武曰既獲仁人王介甫謂仁人者指微子也或謂周公之功人臣之所不能為諒乎曰聖人之為人臣盡臣道而已伯夷叔齊叩馬諫武王伐紂不聽不食周粟此莊周寓言也孔子言餓於首陽之下孟子曰伯夷辟紂耳盗跖横行天下此莊周寓言也孟子曰雞鳴而起孳孳為利耳六韜兼權尚數謀利計功戰國隂謀之書非出於太公也吕吉甫曰徳盛不狎侮莊子乃不能克己復禮之顔回所謂知及之仁不能守之也程正叔曰莊子若學佛而未至者王聖美言嘗見介甫説老莊者聖不足以言之曹子方言列子偽書也何以言之其見於莊子者則甚善其他則不足取是以知之蘇浩然謂劉向不足以知列子楊朱力命二篇最其深者也而謂非一家之言莊子曰道之真以治身其緒餘以治國家其土苴以治天下予以為不然聖人以其所以治身者治國家天下誥誓不及五帝盟詛不及三王皆不然也君子屢盟亂是用長但刺屢盟為非苗民罔中子信以覆詛盟但罪其覆詛盟不以詛盟為非也周公之卜洛也曰使有徳者易以興無徳者易以亡周公豈豫恐後王之無徳者而欲其易以亡乎以為知其所以易亡則不敢不修徳也晉文公之伐曹令無入僖負羈之宫則兵之所入者徧一國矣聖王之兵弔民伐罪故無復讎之師無逞欲之師能以衆正心於為民而已簞食壺漿以迎王師曰奚為後我何施而得斯於民也子犯恃表裏山河不如呉起之言在徳也其欲伐秦穆公又不如文公之不背施也謂子玉不可失又不如先軫之言定人之謂禮也然則何以為霸者之佐也能以民未知信未知義未知禮為先務謂師直為壯曲為老此其所以為霸者之佐也歟若王者之佐如之何勿雜而已矣旅泊三界如晉公子重耳在諸國時蜀先主在劉表處時關羽在曹操處時七敎者父子有親兄弟有愛夫婦有别君臣有義長幼有序朋友有信賔客有禮君臣之義父子之親男女之别百代所不易者衣服之制宫室之度器皿之量王者因時而損益之故商因於夏禮而有所不從也周因於商禮而有所不從也為士者當從今王之禮禮之本出於人情聖人因而道之禮之器出於民之俗聖人因而為之節文耳禮儀三百復三千酬酢天機理必然寒即加衣饑即食孰為末節孰為先程正叔以為自灑掃應對以至贊天地之化育皆常道也子進云聖人制祭祀之儀祝以孝告嘏以慈告則人神之際往來有禮制朝廷之儀君南面臣北向則君臣之際往來有禮用牲于郊牛二天地也社于新邑牛一羊一豕一止祀社也社不言配則郊之二牛非祭配也顧諟天之明命以承上下神祇謂如晉之參宋之火楚之江漢沮漳也世人以往來宴㑹書問為徒費日不若不講之愈是未知先王治人道之意人之所以異於禽獸者以有禮樂相交接之道故曰燦然有文以相接驩然有恩以相與此其所以講信修睦而免於爭奪相殺之患者常消禍於未萌也孟子曰出入相友守望相助疾病相扶持則百姓親睦言往來之不可以已也鄉飲酒曰吾於鄉飲而知王道之易易言宴㑹之不可以已也聘義曰相接以禮讓則不相侵陵言書問之不可以已也此三者所以消禍於未萌而使民免於爭奪相殺之患也竿牘請謁君子所重常人所輕甚者至云可削而去之蓋未之思耳人之所以異於禽獸者以有禮也有禮則有交易曰天地交而萬物通也上下交而其志同也揚子曰天地交萬物生人道交功勲成夫能交則相敬相敬則無害此謙讓所以興而爭奪相殺之禍不作是以聖人重之或曰今之所謂竿牘請謁者徒以為文耳而子重之何也答曰聖人之敎有由中出者樂是也有自外作者禮是也由中出者其文見於外自外作者其情動乎内始則既其文終則既其實其於小人也始則革面終則與之化矣是禮之敎也雖未能化不猶愈於直情而徑行者歟而子欲投魚於淵寘猿於木乎安定先生嘗曰今人家以鄭衛之樂敎處女於禮義無所取鄭衛之音導淫尹吉甫前妻子伯奇後妻子伯封後妻欲其子為世子言於吉甫曰伯奇好妾如不信主上臺觀之乃取蜂去毒而置之衣領中使伯奇掇之吉甫見之使讓伯奇伯奇投於河矣曾㸃聖人之所與而書傳被以不慈之名蓋出於寓言非摭實也年鈞擇賢此語失之矣兄弟天倫也先生一日即兄也族人雖貴不敢以貴加於父兄尊長至於道路則或先或後不同行也惟他人有當回避者吾家舊規中表兄弟甥壻皆來以長幼叙坐唯妹壻則賔之有年齒爵位之相逺者則不盡然予少時詣見父執歐陽公王荆公司馬溫公歐陽公拜則立扶之既再拜但曰拜多其慰撫之如子姪及傳逹正獻公語則變容唯唯見荆公溫公皆先答拜俟叙述世契然後扶之凡致仕官與人相接許以閒居野服相見可也不為立法則郡縣官不識去就者責望於人多矣京路致仕官率以野服接人外郡多不敢以不識去就者多也又近日外郡公人聞新官受命於申狀後粘一扁封小啓長五寸闊三四分其中乃古啓也數十年來不復見矣冬至朔望亦然大要前輩作事周詳後輩作事多闊畧皇祐年前舉人看謁皆用封狀面簽所謁爵其中細書云鄉貢進士姓某名某謹捧狀詣客次祗候某官伏惟尊慈俯賜鑒念謹啓月日鄉貢進士姓某啓未得解者稱應鄉貢進士舉四五年來止用名紙又不論曾預薦與不曾預薦皆單稱進士凡婦人相見雖賤必答拜既當其主母拜則其使令人拜勿答焉可也姨之夫長於已者拜之少者答拜焉可也妻之兄長於已者拜之少者答拜焉可也母之姊妹曰從母妻之姊妹曰姨今人稱呼多混今人多唤妻之兄弟為舅或是隨其子之稱也稱主母曰小娘子案此下疑有闕文近世儒者有戒婦人不油髮不塗面者詩曰豈無膏沐自古而然又有戒婦人不穿耳者莊子曰天子之侍御不爪翦不穿耳則穿耳自古而然但不知於恣耳主上詣寺觀至佛天尊像前皆拜問之耆舊云自仁宗至今四世如此其前不知也明道元年冬十月改崇政殿曰紫宸殿長春殿曰垂拱滋福殿曰皇儀㑹慶殿曰集英承明殿曰端明延慶殿曰福寧崇徽殿曰寳慈天和殿曰觀文二年十二月改天安殿曰大慶端明殿曰延和紹興十二年十一月庚子命内使王晉錫作崇政垂拱二殿移諸司屋宇共一百四十七間昔日中書為東府宻院為西府又謂之兩府熙寧中始起東西府為廨舍中書居東位宻院居西位太宗親飛白書以榜學士之㕔事曰玉堂之院言此乃玉堂學士所居之院也如唐制天子居集賢殿而學士等官居集賢殿書院後止謂之集賢院也今便謂學士所居㕔事為玉堂者誤也元祐初以蘇子由為直舍人院有司檢舉自官制行舍人院廢今舍人職事乃在中書後省於是改權中書舍人遂為故事元豐官制中書省取㫖門下省封駮尚書省奉行未始相干也元祐初始令凡取㫖事三省同上進歸本省各依官制奉行從正獻公之請也參知政事與副樞雖為一等然自副樞改參政為遷轉雖自知院除參政亦為任用其或别以縁故自參政改副樞者須還官惟慶歴六年呉育自參知政事以本官改樞宻副使嘉祐元年給事中參知政事程戡以宰相文潞公親轉兩官為戸侍副樞昭陵中年以後簽書同簽書樞宻院事未全得執政官事體熙寧中王介甫欲用龍圖閣直學士樞宻都承㫖曾孝寛為副樞裕陵不許堅請之乃以為樞宻直學士簽書樞宻院事令所司盡用執政事體然猶班在宣徽南院使王君貺拱辰之下時王御仙花帶不佩魚曾方團帶佩魚舊例簽書只御仙花帶不佩魚三司或為一使或分三使自唐歴五代國初以來沿革不定前賢記之詳矣咸平六年併鹽鐵度支户部為一以㓂萊公準為使自後不復改凡天下應干財賦事皆主之元豐改官制以財賦歸戸部修造歸工部衙司前歸都官衙官帳目歸比部河渠歸水部後致府庫隤毁失壊官物雖為户部尚書省之責然工部不以時檢計都官不以時差監役吏人元祐時遂令應干財賦事皆關戸部尚書尚書㕔司之侍郎以下不預國家之制宰相拜罷皆降麻樞宻使除拜則降麻罷唯降制而已韓魏公自節度使為三司使降麻時方議大任而未也故以為特恩孫文懿抃為御史中丞彈糾其失後馮當世罷樞宻使降麻以樞宻不復置使亦以為特恩也又丁晉公罷相之時止降制以責之忽從中出直院不及知此三事皆循為故事本朝樞宻直學士班序禄賜視閣學士今與閣直學士同位諸行侍郎樞宻直學士呼宻學未改階前官至諫議大夫者呼宻諫轉給事中即呼宻學左右諫議大夫左右司諫正言只許輔弼上徳其政事得失人材可否唯御史臺官得言元祐初方許諫官依臺官言事本朝置通進銀臺封駮司以侍從官知司蓋給事中之職也然舊制止出納文書而已嘉祐中何郯聖從以待制領此職詔令有不便者輒封還之仁宗嘉其盡職皆從之自此始為故事英宗自藩邸入承大統患宗室子孫敎率無素乃詔近臣薦經行修明可以為人師表者增至講讀大小學敎授二十餘員以分敎之又詔娶宗室女補官者許應進士舉其文臣子孫並與文資焉熙寧中内出玉帶垂金魚以寵岐嘉二王神宗又令工琢玉魚袋數年然後成以賜二王舊制執政見任賜笏頭帶親王使相及武臣任樞府皆止賜荔枝帶俗號毬文為笏頭御仙花為荔枝朝省文書亦多從俗呼舊制自差除待制即賜銀緋昭陵晚年張友直除待制賜銀緋㝷出補外六年還朝一日宴從官班張下者皆金紫上問之有司以答遂賜金紫舊制自差除知制誥即賜銀緋熙寧中許門下冲元將着緑除知制誥未賜銀緋王介甫手柬問宋次道敏求云知制誥有着緑者否宋答云先公除知制誥賜銀緋蓋言宣獻公綬也許遂賜銀緋元豐末年蔡元長王子發皆自着緑除中書舍人賜銀緋元祐年中劉器之着緑除右諫議大夫至紹聖中葉濤着緑除中書舍人時章子厚為相以從官銀緋為元祐故事乃賜金紫迄今為例
